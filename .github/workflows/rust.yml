name: Rust CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            rust_toolchain: stable-x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_toolchain || 'stable' }}
          targets: ${{ matrix.target }}
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --verbose
      - name: Run tests
        run: cargo test --target ${{ matrix.target }} --verbose
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nailsnake-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/nailsnake*
            target/${{ matrix.target }}/release/*.pdb
          retention-days: 7

  check-man-page:
    name: Validate man page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check man page syntax
        run: |
          man --warnings -l man/nailsnake.1 >/dev/null 2>&1 || true
          mandoc -T lint man/nailsnake.1 2>&1 || true

  check-cargo-metadata:
    name: Cargo metadata sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version consistency
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name=="NailSnake") | .version')
          echo "Package version: $VERSION"
          if [[ "$VERSION" != "1.0.0" ]]; then
            echo "Expected version 1.0.0, got $VERSION"
            exit 1
          fi

  release:
    name: Create Release
    needs: [lint, test, check-man-page, check-cargo-metadata]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: |
          for target in x86_64-unknown-linux-gnu x86_64-apple-darwin x86_64-pc-windows-msvc x86_64-pc-windows-gnu; do
            rustup target add $target
            cargo build --release --target $target
          done
      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/nailsnake dist/nailsnake-linux-x86_64
          cp target/x86_64-apple-darwin/release/nailsnake dist/nailsnake-macos-x86_64
          cp target/x86_64-pc-windows-msvc/release/nailsnake.exe dist/nailsnake-windows-msvc-x86_64.exe
          cp target/x86_64-pc-windows-gnu/release/nailsnake.exe dist/nailsnake-windows-gnu-x86_64.exe
          cp man/nailsnake.1 dist/
          sha256sum dist/* > dist/SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false